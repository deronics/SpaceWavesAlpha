<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space Waves alpha</title>
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body class="noselect">
    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
    </div>
    <div id="loading-cover" style="display:none;">
      <div id="unity-loading-bar">
        <div id="unity-logo"><img src="logo.png"></div>
        </br></br></br>
        <div id="unity-progress-bar-empty" style="display: none;">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div class="spinner"></div>
      </div>
    </div>
    <script>
      var sdk;
	  var gameInstance;
	  var wasUnityInited = false;
	  var wasYandexInited = false;

      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/9aa410e12f6b1f62bd5af05aeb2036e2.loader.js";
      const config = {
        dataUrl: buildUrl + "/d61227c411ed1e10fd370b785c992c06.data.unityweb",
        frameworkUrl: buildUrl + "/537f0b7460c27854918067ab69e52a8f.framework.js.unityweb",
        codeUrl: buildUrl + "/525d8ef0a6b77120a482f648b9199dbf.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "do.Games",
        productName: "Geometry Waves",
        productVersion: "0.1.1",
      };

      const container = document.querySelector("#unity-container");
      const canvas = document.querySelector("#unity-canvas");
      const loadingCover = document.querySelector("#loading-cover");
      const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      const spinner = document.querySelector('.spinner');

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {

        if (window.screen.height * config.devicePixelRatio > 1300)
    		{
    			config.devicePixelRatio = 1280 / window.screen.height;
    		}
      }
      loadingCover.style.display = "";

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          spinner.style.display = "none";
          progressBarEmpty.style.display = "";
          progressBarFull.style.width = `${100 * progress}%`;
        }).then((unityInstance) => {
          gameInstance = unityInstance;
		  wasUnityInited = true;
          loadingCover.style.display = "none";
		  
		  if (wasYandexInited)
			gameInstance.SendMessage('YandexSDK', 'TryInitSDK');
		
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);

      // Focus
  	  function setFocus() {
  	    container.focus();
  		window.focus();
  		canvas.focus();
  	  }

  	  window.addEventListener("touchstart", () => {
  	    setFocus();
  	  });
  	  window.addEventListener("pointerdown", () => {
  	    setFocus();
  	  });
  	  window.addEventListener("resize", () => {
  	    setFocus();
  	  });
    </script>

    <script src="https://yandex.ru/games/sdk/v2"></script>
  	<script>

  		var player;
  		var payments = null;
		var lb;

  		YaGames.init({
  				screen: {
  					fullscreen: true
  				}
  			})
  			.then(ysdk => {
  				sdk = ysdk;
				sdk.getLeaderboards().then(_lb => lb = _lb);
				InitPayments();
				sdk.adv.showFullscreenAdv();
				console.log("Yandex sdk inited");
				
				wasYandexInited = true;
				
				if (wasUnityInited)
					gameInstance.SendMessage('YandexSDK', 'TryInitSDK');
  			});
		
		function InitPayments() {
            try {
                sdk.getPayments().then(_payments => {
                    console.log('Purchases are available');
                    payments = _payments;
                    return true;
                }).catch(e => {
                    console.log('Purchases are not available', e.message);
                })
            } catch (e) {
                console.error('CRASH Init Payments: ', e.message);
            }
        }

  		// Externs
		function auth() {
  			initPlayer().then(_player => {

  				if (_player.getMode() === 'lite')
  					userWithoutLogIn();
  				else
  					getUser();

  			}).catch(err => {
  				userWithoutLogIn();
  			});
  		}
		
		function getLanguage() {
			console.log('Try set language: ' + sdk.environment.i18n.lang + '...')
			gameInstance.SendMessage('YandexSDK', 'SetLanguage', sdk.environment.i18n.lang);
			gameInstance.SendMessage('YandexSDK', 'SetDomain', sdk.environment.i18n.tld);
		}
		
		function authClicked() {
  			sdk.auth.openAuthDialog().then(() => {
  					auth();
  				}).catch(()=>{
  					userWithoutLogIn();
  				});
  		}
		
		function initPlayer() {
  			console.log('InitPlayerTry')
  			return sdk.getPlayer().then(_player => {
			
  				player = _player;
  				return player;
  			});
  		}
		
		function getUser() {
  			console.log('try to get Profile Data');
  			var data = {"id" : player.getUniqueID(), "name" : player.getName(), "avatarUrlSmall" : player.getPhoto('small'), "avatarUrlMedium" : player.getPhoto('medium'), "avatarUrlLarge" : player.getPhoto('large')};
  			gameInstance.SendMessage('YandexSDK', 'OnAuthSucceded', JSON.stringify(data));
  			console.log('data: ' + JSON.stringify(data));
  			console.log('get Profile Data done');
  		}

  		function userWithoutLogIn() {
  			console.log('user not log in');
  			gameInstance.SendMessage('YandexSDK', 'OnAuthMissed');
  		}

  		function getUserData() {
  			player.getData().then(stats => {
  				gameInstance.SendMessage('YandexSDK', 'OnDataReceived', JSON.stringify(stats));
  			});
  		}

  		function setUserData(_data) {
  			console.log('Try Save');
  			player.setData({
  				data: _data
  			}).then(() => {
  				console.log('saved');
  			}).catch(() => {
  				console.log('unsaved')
  			});
  		}
		
  		function showFullscrenAd() {
  			sdk.adv.showFullscreenAdv({
  				callbacks: {
  					onClose: function(wasShown) {
  						gameInstance.SendMessage('YandexSDK', 'OnInterstitialClose');
  					},
  					onError: function(error) {
  						console.log('Error while open Fullscreen video ad:', error);
  					}
  				}
  			})
  		}

  		function showRewardedAd() {
  			sdk.adv.showRewardedVideo({
				callbacks: {
					onOpen: () => {},
					onRewarded: () => {
						gameInstance.SendMessage('YandexSDK', 'OnRewarded');
						console.log('Rewarded!');
					},
					onClose: () => {
						gameInstance.SendMessage('YandexSDK', 'OnRewardedClosed');
						console.log('Rewarded video ad closed.');
					},
					onError: (e) => {
						gameInstance.SendMessage('YandexSDK', 'OnRewardedError');
						console.log('Error while open rewarded video ad:', e);
					}
				}
			})
  		}

  		function logMessage(_data) {
  			console.log(_data);
  		}
		
		function openNewTab(_url) {
  			var isMacLike = /(Mac|iPhone|iPod|iPad)/i.test(navigator.platform);
			
			if (isMacLike)
				window.open(_url,"_top")
			else
				window.open(_url,'_blank');
  		}
		
		function showRateApp() {
  			sdk.feedback.canReview()
				.then(({ value, reason }) => {
					if (value) {
						sdk.feedback.requestReview()
							.then(({ feedbackSent }) => {
								console.log(feedbackSent);
							})
					} else {
						console.log(reason)
					}
				})
  		}
		
		// Leaderboard
		function setLeaderboard(score) {
		  console.log("setting leaderboard, score: " + score);
		  lb.setLeaderboardScore('leaderboard', score);
		}
		
		function getAuthLeaderboardEntries() {
		  lb.getLeaderboardEntries('leaderboard', { quantityTop: 5, quantityAround: 0, includeUser: true })
			.then(res => {
			  for (i in res.entries)
				res.entries[i].player["avatarURL"] = res.entries[i].player.getAvatarSrc("medium");
			  gameInstance.SendMessage('YandexSDK', 'OnEntriesReady', JSON.stringify(res));
		    });
		}
		
		function getLeaderboardEntries() {
		  lb.getLeaderboardEntries('leaderboard', { quantityTop: 5, quantityAround: 0 })
		    .then(res => {
			  for (i in res.entries)
				res.entries[i].player["avatarURL"] = res.entries[i].player.getAvatarSrc("medium");
			  gameInstance.SendMessage('YandexSDK', 'OnEntriesReady', JSON.stringify(res));
			});
		}
		
		function getPlayerLeaderboard() {
		  lb.getLeaderboardPlayerEntry('leaderboard')
		    .then(res => {
			  gameInstance.SendMessage('YandexSDK', 'OnPlayerLeaderboardReceive', JSON.stringify(res));
			});
		}
		
		// Payments
		function consumePurchases() {
            try {
                if (payments != null) {
                    payments.getPurchases().then(purchases => {
                        console.log('Unprocessed purchases: ', purchases.length);
                        for (i = 0; i < purchases.length; i++) {
                            payments.consumePurchase(purchases[i].purchaseToken);
                            gameInstance.SendMessage('YandexSDK', 'OnConsumePurchase', purchases[i].productID);
                        }
                    });
                }
                else console.log('Consume purchases: payments null');
            } catch (e) {
                console.error('CRASH Consume purchases: ', e.message);
            }
        }
		
		function buyPayments(id) {
            try {
                if (payments != null) {
                    payments.purchase(id).then(() => {
                        console.log('Purchase Success');
                        consumePurchase(id);
                        setFocus();
                    }).catch(e => {
						console.error(`Purchase Failed (id: ${id}): ${e.message}`);
                        gameInstance.SendMessage('YandexSDK', 'OnPurchaseFailed', id);
                        setFocus();
                    })
                } else {
                    console.log('Payments == null');
                }
            } catch (e) {
                console.error('CRASH Buy Payments: ', e.message);
                setFocus();
            }
        }
		
		function consumePurchase(id) {
            try {
                if (payments != null) {
                    payments.getPurchases().then(purchases => {
                        for (i = 0; i < purchases.length; i++) {
                            if (purchases[i].productID === id) {
                                payments.consumePurchase(purchases[i].purchaseToken);
                                gameInstance.SendMessage('YandexSDK', 'OnPurchaseSuccess', id);
                            }
                        }
                    });
                }
                else console.log('Consume purchase: payments null');
            } catch (e) {
                console.error('CRASH Consume Purchase: ', e.message);
            }
        }

  	</script>
  </body>
</html>
